<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | Trad Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles/style.css" >
  
</head>
<body>
       <!-- Sidebar -->
    <div class="sidebar">
        <div class="institucion">
            <div class="logo">
                <div class="logocolor">
                    <span class="iniciallogo">TC</span>
                </div>
                <span class="nombrelogo">Trad</span>
                <span class="nombrelogo">Conect</span>
            </div>
        </div>
        <div class="rol-selector" onclick="ToggleRole()">
            <span id="role-text">modo: proveedor</span>
        </div>
        <div id="menu"></div>
    </div>

    <!-- Overlay para móvil -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <!-- Main Content -->
    <div class="main">
        <!-- Header Principal -->
        <header class="main-header">
            <div class="header-top">

                <button class="menu-btn" id="renderMenu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>

                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar en Trad Connect...">
                </div>

                <div class="user-actions">

                    <div class="cart-icon-wrapper" id="cartToggle">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount">0</span>
                    </div>

                    <i class="far fa-bell"></i>

                    <div class="user-profile">
                        <div class="user-info-text">
                            <span class="user-name">Juan Pérez</span>
                            <span class="user-status">Premium</span>
                        </div>
                        <div class="user-avatar">JP</div>
                    </div>
                </div>
            </div>
        </header>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="width: 100px; height: 100px; background: var(--blue-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 2rem; color: var(--blue-primary);">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h2>Configuración de Perfil</h2>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="profileName" value="Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="profileEmail" value="juan.perez@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Empresa</label>
                    <input type="text" value="Suministros Pro S.A." disabled>
                </div>
                <button type="submit" class="rol-selector" style="width: 100%; margin-top: 10px; border: none;">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script src="javascripts/rolusuario.js"></script>
    <script src="javascripts/profile.js"></script>
</body>
</html>

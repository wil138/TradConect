<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Análisis | Commerce Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="institucion">
            <div class="logo">
                <div class="logocolor"><samp class="iniciallogo">CC</samp></div>
                <span class="nombrelogo">Commerce Connect</span>
            </div>
        </div>
        <div class="rol-selector" onclick="ToggleRole()">
            <span id="role-text">Modo: Proveedor</span>
        </div>
        <div id="menu"></div>
    </div>
    <div class="overlay"></div>

    <div class="main">
        <header class="header">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="header-search-container">
                <input placeholder="Filtrar análisis..." />
            </div>
            <span>👤</span>
        </header>

        <div class="card">
            <h2>Análisis Avanzado</h2>
            <p style="color: var(--text-muted);">Métricas detalladas de tu rendimiento.</p>
            <div style="height: 300px; margin-top: 20px;">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </div>

    <script src="javascripts/rolusuario.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'],
                    datasets: [{
                        label: 'Rendimiento',
                        data: [65, 59, 80, 81],
                        borderColor: '#2563eb',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        });
    </script>
</body>
</html>

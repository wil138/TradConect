<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Análisis | Commerce Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles/style.css" >
</head>
<body>
    <!-- 🧭 Sidebar -->
    <div class="sidebar">
        <div class="institucion">
            <div class="logo">
                <div class="logocolor">
                    <span class="iniciallogo">CC</span>
                </div>
                <span class="nombrelogo">Commerce</span>
                <span class="nombrelogo">Conect</span>
            </div>
        </div>
        <div class="rol-selector" onclick="ToggleRole()">
            <span id="role-text">modo: proveedor</span>
        </div>
        <div id="menu"></div>
    </div>
    
    <!-- Overlay para móvil -->
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <!-- 📊 Main Content -->
    <div class="main">
        <!-- 🔝 Header Principal -->
        <header class="main-header">
            <div class="header-top">
                <button class="menu-btn" id="renderMenu" onclick="toggleMenu()">☰</button>
                
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar en Commerce Connect...">
                </div>
                
                <div class="user-actions">

                    <i class="far fa-bell"></i>
                    
                    <div class="user-profile">
                        <div class="user-info-text">
                            <span class="user-name">Juan Pérez</span>
                            <span class="user-status">Premium</span>
                        </div>
                        <div class="user-avatar">JP</div>
                    </div>
                </div>
            </div>
        </header>
        
        <div class="card">
            <h2>Análisis de Rendimiento</h2>
            <p style="color: var(--text-muted);">Visualiza el crecimiento de tu negocio en el último mes.</p>
            <div style="height: 400px; margin-top: 20px;">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </div>

    <script src="javascripts/rolusuario.js"></script>
    <script src="javascripts/analytics.js"></script>
</body>
</html>

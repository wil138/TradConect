<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturación | Commerce Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles/style.css">
    <link rel="stylesheet" href="Styles/pages.css">
</head>
<body>
    <div class="sidebar">
        <div class="institucion">
            <div class="logo">
                <div class="logocolor"><samp class="iniciallogo">CC</samp></div>
                <span class="nombrelogo">Commerce Connect</span>
            </div>
        </div>
        <div class="rol-selector" onclick="ToggleRole()">
            <span id="role-text">Modo: Proveedor</span>
        </div>
        <div id="menu"></div>
    </div>
    <div class="overlay"></div>

    <div class="main">
        <header class="header">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="header-search-container">
                <input placeholder="Buscar facturas..." />
            </div>
            <span>👤</span>
        </header>

        <div class="card">
            <h2>Facturación y Pagos</h2>
            <div class="table-container" style="margin-top: 20px;">
                <table>
                    <thead>
                        <tr>
                            <th>Nº Factura</th>
                            <th>Fecha</th>
                            <th>Monto</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="invoicesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="javascripts/rolusuario.js"></script>
    <script src="javascripts/invoices.js"></script>
</body>
</html>

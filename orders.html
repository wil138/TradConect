<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos | Trad Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles/style.css" >
    <link rel="stylesheet" href="Styles/pages.css">
</head>
<body>
        <!-- Sidebar -->
    <div class="sidebar">
        <div class="institucion">
            <div class="logo">
                <div class="logocolor">
                    <span class="iniciallogo">TC</span>
                </div>
                <span class="nombrelogo">Trad</span>
                <span class="nombrelogo">Conect</span>
            </div>
        </div>
        <div class="rol-selector" onclick="ToggleRole()">
            <span id="role-text">modo: proveedor</span>
        </div>
        <div id="menu"></div>
    </div>

    <!-- Overlay para móvil -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <!-- Main Content -->
    <div class="main">
        <!-- Header Principal -->
        <header class="main-header">
            <div class="header-top">

                <button class="menu-btn" id="renderMenu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>

                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar en Trad Connect...">
                </div>

                <div class="user-actions">

                    <div class="cart-icon-wrapper" id="cartToggle">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount">0</span>
                    </div>

                    <i class="far fa-bell"></i>

                    <div class="user-profile">
                        <div class="user-info-text">
                            <span class="user-name">Juan Pérez</span>
                            <span class="user-status">Premium</span>
                        </div>
                        <div class="user-avatar">JP</div>
                    </div>
                </div>
            </div>
        </header>
        <div class="container">
            <header class="header">
                <h1>Gestión de Pedidos</h1>
                <p>Monitorea y procesa las solicitudes de tus clientes.</p>
            </header>

            <div class="tabs">
                <button class="tab-btn active" data-filter="todos">Todos</button>
                <button class="tab-btn" data-filter="Pendiente">Pendientes</button>
                <button class="tab-btn" data-filter="Enviado">Enviados</button>
                <button class="tab-btn" data-filter="Entregado">Completados</button>
                <button class="tab-btn" data-filter="Cancelado">Cancelados</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Cliente</th>
                            <th>Fecha</th>
                            <th style="text-align: center;">Items</th>
                            <th>Total</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="javascripts/rolusuario.js"></script>
    <script src="javascripts/orders.js"></script>
</body>
</html>

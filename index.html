<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Commerce Connect </title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--  Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- estilo-->
     <link rel="stylesheet" href="/Styles/style.css ">
     
</head>

<body>

    <!-- 🧭 Sidebar --> 
    <div class="sidebar">

        <div class="institucion">
            <!-- esta parte se puede cambiar por una imagen y anadir comportamiento -->
            <div class="logo">
                <div class="logocolor">
                    <samp class="iniciallogo">CC</samp>
                </div>
                <span class="nombrelogo">Commerce</span>
                <span class="nombrelogo">Conect</span>
            </div>
        </div>
        <div class="rol-selector" onclick="ToggleRole()">
            <span id="role-text">modo: provedor</span>
        </div>
        <div id ="menu" ></div>
    </div>
    <div class="overlay" onclick="renderMenu()" onclick="toggleMenu()"></div>
    <!-- 📊 Main -->
    <div class="main">

        <!-- 🔝 Header -->
        <header class="header">
            <button class="menu-btn" id="renderMenu" onclick="toggleMenu()">☰</button>
            <input placeholder="Buscar pedidos, productos..." />
            <span>👤</span>
        </header>

        <!-- 📊 KPI -->
        <div class="OperacionesKPI">

            <div class="encabesado1">
                <span class="encabesado2">📊</span>
                <h2 class="encabesado3">Monitor de Operaciones</h2>
                <span class="encabesado4">Real-time SQL</span>
            </div>


            <div class="kpis">

                <div class="card kpi">
                    <h5>Ventas del Día</h5>
                    <h2 id="ventas"></h2>
                    <p id="vs"></p>
                </div>

                <div class="card kpi">
                    <h5>Pedidos Pendientes</h5>
                    <h2 id="pedidos"></h2>
                    <p id="urge"></p>
                </div>

                <div class="card kpi">
                    <h5>Stock Crítico</h5>
                    <h2 id="stock"></h2>
                    <p id="critic"></p>
                </div>

                <div class="card kpi">
                    <h5>Nuevos Clientes</h5>
                    <h2 id="clientes"></h2>
                    <p id="newc"></p>
                </div>
            </div>
        </div>

        <!-- 🔵 Operación -->
        <div class="card">
            <h3>Flujo de Pedidos por Hora</h3>
            <canvas id="transChart"></canvas>
        </div>

        <!-- 🟣 BI -->
        <h3 class="section-title">Crecimiento Estratégico</h3>

        <div class="grid">

            <div class="card">
                <h3>Tendencia Histórica</h3>
                <canvas id="growthChart"></canvas>
            </div>

            <div class="card">
                <h3>Ventas por Zona</h3>
                <canvas id="regionChart"></canvas>
            </div>

            <div class="card">
                <h3>Proyección</h3>
                <canvas id="forecastChart"></canvas>
            </div>

        </div>

    </div>

    
   
</body>

 <!--javascript-->
<script src="/javascripts/Datasimulation.js"></script>  
<script src="/javascripts/rolusuario.js"></script>


</html>
